name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.DROPLET_PORT || '22' }}" \
            -H "${{ secrets.DROPLET_HOST }}" >> ~/.ssh/known_hosts

      - name: Trigger remote deploy
        env:
          HOST: ${{ secrets.DROPLET_HOST }}
          USER: ${{ secrets.DROPLET_USER }}
          PORT: ${{ secrets.DROPLET_PORT || '22' }}
        run: |
          ssh -p "$PORT" -i ~/.ssh/id_ed25519 "$USER@$HOST" \
            'bash /opt/billionmail/scripts/deploy.sh'
